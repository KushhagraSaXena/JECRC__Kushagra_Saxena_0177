
<!DOCTYPE html>
<html>
<head>
<title>Online Order Filtering Greater than 1000</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
}

.box{
    background:white;
    width:300px;
    margin:100px auto;
    padding:20px;
    border:1px solid #ccc;
}

button{
    padding:8px 12px;
    margin-top:10px;
    background:#2196F3;
    color:white;
    border:none;
    cursor:pointer;
}

.result{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Online Order Filtering Greater than 1000</h2>

<p>Orders: [450, 1200, 700, 3000, 1500]</p>

<button onclick="filterOrders()">Filter Orders</button>

<div class="result" id="output"></div>
</div>

<script>

const orders = [450, 1200, 700, 3000, 1500];

function filterOrders(){

    const result = orders.filter(order => order > 1000);

    document.getElementById("output").innerHTML = result;

}

</script>

</body>
</html>
