<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Click Analytics</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

button{
    padding: 12px 25px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

.buy{
    background-color: #28a745;
    color: white;
}

.wishlist{
    background-color: #007bff;
    color: white;
}
</style>

</head>
<body>

<h2>Product Actions</h2>

<button class="buy" onclick="trackClick('Buy Now')">Buy Now</button>

<button class="wishlist" onclick="trackClick('Add Wishlist')">Add Wishlist</button>

<script>

// Logger object
const logger = {

    log: function(level, message, action){

        const logData = {
            level: level,
            message: message,
            action: action,
            timestamp: new Date().toISOString()
        };

        console.log("Analytics Log:", logData);

    }

};

function trackClick(action){

    logger.log("INFO","User Action:",action);

}

</script>

</body>
</html>
