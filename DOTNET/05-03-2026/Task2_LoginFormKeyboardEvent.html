<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Form Keyboard Event</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 80px;
}

input{
    padding: 10px;
    font-size: 16px;
    width: 200px;
}

</style>

</head>
<body>

<h2>Login-Page</h2>

<input type="text" id="username" placeholder="Enter username">

<script>

document.getElementById("username").addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        console.log("Login attempt triggered");

        alert("Submitting login form");

    }

});

</script>

</body>
</html>
