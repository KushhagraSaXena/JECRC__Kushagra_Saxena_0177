<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Click Like Product</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
    background-color: #f5f5f5;
}

#product{
    cursor: pointer;
    border-radius: 10px;
    transition: transform 0.2s;
}

#product:hover{
    transform: scale(1.05);
}

p{
    font-size: 20px;
    margin-top: 20px;
}
</style>

</head>
<body>

<h2>Double Click Product to Like</h2>

<img id="product" src="https://via.placeholder.com/200">

<p>Likes: <span id="count">0</span></p>

<script>

let likes = 0;

document.getElementById("product").addEventListener("dblclick", function(){

    likes++;

    document.getElementById("count").innerText = likes;

    console.log("Product liked", likes);

});

</script>

</body>
</html>
